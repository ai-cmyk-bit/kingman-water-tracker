<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kingman Water Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;color:#1a1a1a;min-height:100vh;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

.shell{max-width:520px;margin:0 auto;padding:40px 24px 60px}

/* header */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px}
.header-left{}
.farm-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:4px}
.app-title{font-size:24px;font-weight:700;color:#1a1a1a;letter-spacing:-.5px}
.header-right{display:flex;gap:8px;padding-top:4px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #e8e8e8;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#555;transition:background .15s}
.icon-btn:hover{background:#f0f0f0}

/* scanned pill */
.scanned-pill{display:inline-flex;align-items:center;gap:6px;background:#e8f0fe;border-radius:6px;padding:7px 12px;font-size:12px;color:#1a56db;font-weight:500;margin-bottom:24px;letter-spacing:.1px}

/* home */
.home-greeting{font-size:13px;color:#999;margin-bottom:6px;font-weight:500;letter-spacing:.2px}
.home-heading{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:28px;letter-spacing:-.3px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.mode-card{background:#fff;border:1.5px solid #ebebeb;border-radius:16px;padding:24px 20px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.mode-card:hover{border-color:#1a1a1a;transform:translateY(-1px)}
.mode-card:active{transform:translateY(0)}
.mode-card.startup:hover{border-color:#16a34a}
.mode-card.shutdown:hover{border-color:#dc2626}
.mode-dot{width:10px;height:10px;border-radius:50%;margin-bottom:14px}
.dot-green{background:#16a34a}
.dot-red{background:#dc2626}
.mode-name{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px;letter-spacing:-.2px}
.mode-desc{font-size:12px;color:#aaa;line-height:1.5}
.mode-arrow{position:absolute;bottom:20px;right:18px;font-size:18px;color:#ddd}

/* card */
.card{background:#fff;border-radius:20px;padding:28px;margin-bottom:12px;border:1px solid #ebebeb}

/* section head */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid #f0f0f0}
.sec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sec-title{font-size:17px;font-weight:700;color:#1a1a1a;letter-spacing:-.3px}
.sec-sub{font-size:12px;color:#aaa;margin-top:2px}

/* fields */
.field{margin-bottom:20px}
.flabel{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#aaa;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.flabel-opt{font-size:10px;font-weight:500;color:#ccc;letter-spacing:.5px}
.finput{width:100%;border:1.5px solid #ebebeb;border-radius:10px;padding:11px 14px;font-size:14px;color:#1a1a1a;background:#fdfdfd;outline:none;transition:border .15s;font-family:inherit;-webkit-appearance:none;appearance:none}
.finput:focus{border-color:#1a1a1a;background:#fff}
select.finput{cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* blocks */
.block-wrap{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
.bblock{border:1.5px solid #ebebeb;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;background:#fdfdfd;color:#888;transition:all .12s;letter-spacing:.2px}
.bblock.sel{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.bblock:hover:not(.sel){border-color:#aaa;color:#555}
.sel-blocks{font-size:12px;color:#16a34a;margin-top:9px;font-weight:500}

/* fertigation */
.fert-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:#fdfdfd;border:1.5px solid #ebebeb;border-radius:10px;cursor:pointer;transition:border .15s}
.fert-row:hover{border-color:#aaa}
.fert-row.checked{border-color:#16a34a;background:#f0fdf4}
.fert-check{width:18px;height:18px;border:2px solid #ddd;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;font-size:11px;color:#fff}
.fert-check.on{background:#16a34a;border-color:#16a34a}
.fert-text{flex:1}
.fert-name{font-size:14px;font-weight:600;color:#1a1a1a}
.fert-desc{font-size:12px;color:#aaa;margin-top:1px}

/* error */
.err{font-size:13px;color:#dc2626;margin-top:14px;padding:10px 14px;background:#fff5f5;border-radius:8px;border:1px solid #fee2e2}

/* nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:20px;border-top:1px solid #f0f0f0}
.btn-back{background:none;border:none;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;padding:0;letter-spacing:.2px}
.btn-back:hover{color:#555}
.btn-save{background:#1a1a1a;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;letter-spacing:-.1px;transition:opacity .15s}
.btn-save:hover{opacity:.8}
.btn-save:disabled{opacity:.35;cursor:not-allowed}

/* success */
.success-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f4f0;padding:24px}
.success-card{background:#fff;border-radius:24px;padding:44px 36px;max-width:380px;width:100%;text-align:center;border:1px solid #ebebeb}
.s-check{width:60px;height:60px;border-radius:50%;background:#f0fdf4;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:24px}
.s-title{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-.4px;margin-bottom:6px}
.s-sub{font-size:13px;color:#aaa;margin-bottom:28px}
.s-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.s-stat{background:#f5f4f0;border-radius:12px;padding:14px}
.s-slabel{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#aaa;margin-bottom:5px}
.s-sval{font-size:19px;font-weight:700;color:#1a1a1a;letter-spacing:-.3px}
.btn-again{width:100%;background:#1a1a1a;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;letter-spacing:-.1px}
.btn-again:hover{opacity:.8}

/* QR */
.qr-shell{min-height:100vh;background:#f5f4f0;padding:40px 24px;display:none}
.qr-top{max-width:700px;margin:0 auto 28px;display:flex;align-items:center;gap:16px}
.qr-heading{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:-.3px}
.qr-sub{font-size:13px;color:#aaa;margin-top:3px}
.qr-grid{max-width:700px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.qr-card{background:#fff;border:1px solid #ebebeb;border-radius:16px;padding:22px;display:flex;flex-direction:column;align-items:center;text-align:center}
.qr-name{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:14px;letter-spacing:-.2px}
.qr-hint{font-size:11px;color:#ccc;margin-top:9px;letter-spacing:.3px}
.qr-dl{background:none;border:1.5px solid #ebebeb;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:#888;cursor:pointer;margin-top:12px;font-family:inherit}
.qr-dl:hover{border-color:#aaa;color:#555}
.hidden{display:none}
</style>
</head>
<body>

<!-- QR -->
<div class="qr-shell" id="qr-view">
  <div class="qr-top">
    <button class="icon-btn" onclick="showView('home')" style="flex-shrink:0">←</button>
    <div><div class="qr-heading">Well QR codes</div><div class="qr-sub">Scan to open with well pre-selected</div></div>
  </div>
  <div class="qr-grid" id="qr-grid"></div>
  <div style="text-align:center;font-size:11px;color:#ccc;margin-top:32px;letter-spacing:.5px">PRINT WITH CMD+P / CTRL+P</div>
</div>

<!-- Success -->
<div class="success-wrap hidden" id="success-view">
  <div class="success-card">
    <div class="s-check">✓</div>
    <div class="s-title" id="s-title">Logged</div>
    <div class="s-sub" id="s-sub"></div>
    <div class="s-stats" id="s-stats"></div>
    <button class="btn-again" onclick="resetToHome()">Log another run</button>
  </div>
</div>

<!-- Main -->
<div class="shell" id="form-view">
  <div class="header">
    <div class="header-left">
      <div class="farm-label">Kingman Farm</div>
      <div class="app-title">Water Tracker</div>
    </div>
    <div class="header-right">
      <div class="icon-btn" onclick="showView('qr')" title="QR Codes">⊞</div>
    </div>
  </div>
  <div id="scanned-pill" class="scanned-pill hidden"></div>
  <div id="main-content"></div>
</div>

<script>
const SHEET_URL="https://script.google.com/macros/s/AKfycbz1h8OLEPKHgn4ooY3cbYijt9rW9eAvMmBsLjAWQHcQXtbZ1ap07KUXcS2kI49fRLKu/exec";
const WELLS=["Well 1","Well 2","Well 3","Well 4","Well 5","Well 6","Tank 1","Tank 2","Tank 3"];
const BLOCKS=["1A","1B","1C","1D","2A","2B","2C","2D","3A","3B","3C","3D","4A","4B","4C","4D","5A","5B","5C","5D","6A","6B","6C","6D","120"];

let preWell="", blocks=[], fertigation=false, submitting=false;

function nowLocal(){
  const d=new Date();
  d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  return d.toISOString().slice(0,16);
}

function init(){
  const w=new URLSearchParams(window.location.search).get("well");
  if(w&&WELLS.includes(w)){
    preWell=w;
    const p=document.getElementById("scanned-pill");
    p.textContent="◉  "+w+" pre-selected";
    p.classList.remove("hidden");
  }
  buildQR();
  renderHome();
}

function showView(v){
  document.getElementById("form-view").style.display=v==="qr"||v==="success"?"none":"";
  document.getElementById("qr-view").style.display=v==="qr"?"block":"none";
  document.getElementById("success-view").classList.toggle("hidden",v!=="success");
}

function buildQR(){
  const base=window.location.href.split("?")[0];
  document.getElementById("qr-grid").innerHTML=WELLS.map(w=>`
    <div class="qr-card">
      <div class="qr-name">${w}</div>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(base+"?well="+encodeURIComponent(w))}" style="width:150px;height:150px;border-radius:8px" alt="${w}">
      <div class="qr-hint">KINGMAN WATER TRACKER</div>
      <button class="qr-dl" onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(base+"?well="+encodeURIComponent(w))}','_blank')">Download</button>
    </div>`).join("");
}

function wellOpts(sel){
  return'<option value="">Select…</option>'+WELLS.map(w=>`<option${w===sel?" selected":""}>${w}</option>`).join("");
}

function blockBtns(){
  return BLOCKS.map(b=>`<button class="bblock${blocks.includes(b)?" sel":""}" onclick="toggleBlock('${b}')">${b}</button>`).join("");
}

function toggleBlock(b){
  blocks=blocks.includes(b)?blocks.filter(x=>x!==b):[...blocks,b];
  document.getElementById("block-grid").innerHTML=blockBtns();
  document.getElementById("sel-blocks").textContent=blocks.length?"Selected: "+blocks.join(", "):"";
}

function toggleFert(){
  fertigation=!fertigation;
  const row=document.getElementById("fert-row");
  const check=document.getElementById("fert-check");
  row.classList.toggle("checked",fertigation);
  check.classList.toggle("on",fertigation);
  check.textContent=fertigation?"✓":"";
}

function showErr(msg){
  const el=document.getElementById("err-msg");
  if(el)el.innerHTML=`<div class="err">${msg}</div>`;
}

function getHour(){
  const now=new Date();
  return now.getHours()<12?"Good morning":"Good afternoon";
}

// HOME
function renderHome(){
  blocks=[]; fertigation=false; submitting=false;
  document.getElementById("main-content").innerHTML=`
    <div class="home-greeting">${getHour()}</div>
    <div class="home-heading">What are you logging?</div>
    <div class="mode-grid">
      <div class="mode-card startup" onclick="renderStartup()">
        <div class="mode-dot dot-green"></div>
        <div class="mode-name">Start up</div>
        <div class="mode-desc">Log initial readings when firing up a well</div>
        <div class="mode-arrow">→</div>
      </div>
      <div class="mode-card shutdown" onclick="renderShutdown()">
        <div class="mode-dot dot-red"></div>
        <div class="mode-name">Shut down</div>
        <div class="mode-desc">Log final readings when shutting down a well</div>
        <div class="mode-arrow">→</div>
      </div>
    </div>`;
}

// STARTUP
function renderStartup(){
  blocks=[]; fertigation=false;
  document.getElementById("main-content").innerHTML=`
    <div class="card">
      <div class="sec-head">
        <div class="sec-dot dot-green"></div>
        <div><div class="sec-title">Start up</div><div class="sec-sub">Record initial readings</div></div>
      </div>
      <div class="field">
        <div class="flabel">Date &amp; time</div>
        <input class="finput" type="datetime-local" id="f-dt" value="${nowLocal()}">
      </div>
      <div class="field">
        <div class="flabel">Well</div>
        <select class="finput" id="f-well">${wellOpts(preWell)}</select>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">Engine hours</div>
          <input class="finput" type="number" step="0.1" placeholder="1234.5" id="f-eng">
        </div>
        <div class="field">
          <div class="flabel">Flow meter start</div>
          <input class="finput" type="number" step="0.01" placeholder="520.00" id="f-flow">
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">GPM <span class="flabel-opt">Optional</span></div>
          <input class="finput" type="number" step="1" placeholder="850" id="f-gpm">
        </div>
        <div class="field">
          <div class="flabel">RPM <span class="flabel-opt">Optional</span></div>
          <input class="finput" type="number" step="1" placeholder="1750" id="f-rpm">
        </div>
      </div>
      <div class="field">
        <div class="flabel">Blocks being irrigated</div>
        <div class="block-wrap" id="block-grid">${blockBtns()}</div>
        <div class="sel-blocks" id="sel-blocks"></div>
      </div>
      <div class="field">
        <div class="flabel">Fertigation</div>
        <div class="fert-row" id="fert-row" onclick="toggleFert()">
          <div class="fert-check" id="fert-check"></div>
          <div class="fert-text">
            <div class="fert-name">Fertigation active</div>
            <div class="fert-desc">Fertilizer is being applied during this run</div>
          </div>
        </div>
      </div>
      <div id="err-msg"></div>
      <div class="nav">
        <button class="btn-back" onclick="renderHome()">← Back</button>
        <button class="btn-save" id="save-btn" onclick="submitStartup()">Save start up</button>
      </div>
    </div>`;
}

async function submitStartup(){
  if(submitting)return;
  const dt=document.getElementById("f-dt").value;
  const well=document.getElementById("f-well").value;
  const eng=document.getElementById("f-eng").value;
  const flow=document.getElementById("f-flow").value;
  if(!dt||!well||!eng||!flow||blocks.length===0){showErr("Please complete all required fields and select at least one block.");return;}
  submitting=true;
  const btn=document.getElementById("save-btn");
  btn.disabled=true; btn.textContent="Saving…";
  const params=new URLSearchParams({type:"startup",datetime:dt,well,engine_hours:eng,flow_meter_start:flow,
    gpm:document.getElementById("f-gpm").value||"",rpm:document.getElementById("f-rpm").value||"",
    blocks:blocks.join(", "),fertigation:fertigation?"Yes":"No"});
  try{
    await fetch(`${SHEET_URL}?${params}`,{method:"GET",mode:"no-cors"});
    btn.textContent="Saved";
    setTimeout(()=>{
      document.getElementById("s-title").textContent="Start up logged";
      document.getElementById("s-sub").textContent=well+" · "+blocks.join(", ");
      document.getElementById("s-stats").innerHTML=`
        <div class="s-stat"><div class="s-slabel">Flow meter</div><div class="s-sval">${flow}</div></div>
        <div class="s-stat"><div class="s-slabel">Engine hrs</div><div class="s-sval">${eng}</div></div>`;
      showView("success");
    },600);
  }catch(e){showErr("Failed to save. Check your connection and try again.");btn.disabled=false;btn.textContent="Save start up";}
  submitting=false;
}

// SHUTDOWN
function renderShutdown(){
  document.getElementById("main-content").innerHTML=`
    <div class="card">
      <div class="sec-head">
        <div class="sec-dot dot-red"></div>
        <div><div class="sec-title">Shut down</div><div class="sec-sub">Record final readings</div></div>
      </div>
      <div class="field">
        <div class="flabel">Date &amp; time</div>
        <input class="finput" type="datetime-local" id="f-dt" value="${nowLocal()}">
      </div>
      <div class="field">
        <div class="flabel">Well</div>
        <select class="finput" id="f-well">${wellOpts(preWell)}</select>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">Flow meter end</div>
          <input class="finput" type="number" step="0.01" placeholder="535.00" id="f-flow">
        </div>
        <div class="field">
          <div class="flabel">Engine hours</div>
          <input class="finput" type="number" step="0.1" placeholder="1238.5" id="f-eng">
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">GPM <span class="flabel-opt">Optional</span></div>
          <input class="finput" type="number" step="1" placeholder="850" id="f-gpm">
        </div>
        <div class="field">
          <div class="flabel">RPM <span class="flabel-opt">Optional</span></div>
          <input class="finput" type="number" step="1" placeholder="1750" id="f-rpm">
        </div>
      </div>
      <div id="err-msg"></div>
      <div class="nav">
        <button class="btn-back" onclick="renderHome()">← Back</button>
        <button class="btn-save" id="save-btn" onclick="submitShutdown()">Save shut down</button>
      </div>
    </div>`;
}

async function submitShutdown(){
  if(submitting)return;
  const dt=document.getElementById("f-dt").value;
  const well=document.getElementById("f-well").value;
  const flow=document.getElementById("f-flow").value;
  const eng=document.getElementById("f-eng").value;
  if(!dt||!well||!flow||!eng){showErr("Please complete all required fields.");return;}
  submitting=true;
  const btn=document.getElementById("save-btn");
  btn.disabled=true; btn.textContent="Saving…";
  const params=new URLSearchParams({type:"shutdown",datetime:dt,well,flow_meter_end:flow,engine_hours:eng,
    gpm:document.getElementById("f-gpm").value||"",rpm:document.getElementById("f-rpm").value||""});
  try{
    await fetch(`${SHEET_URL}?${params}`,{method:"GET",mode:"no-cors"});
    btn.textContent="Saved";
    setTimeout(()=>{
      document.getElementById("s-title").textContent="Shut down logged";
      document.getElementById("s-sub").textContent=well;
      document.getElementById("s-stats").innerHTML=`
        <div class="s-stat"><div class="s-slabel">Flow meter end</div><div class="s-sval">${flow}</div></div>
        <div class="s-stat"><div class="s-slabel">Engine hrs</div><div class="s-sval">${eng}</div></div>`;
      showView("success");
    },600);
  }catch(e){showErr("Failed to save. Check your connection and try again.");btn.disabled=false;btn.textContent="Save shut down";}
  submitting=false;
}

function resetToHome(){showView("form");renderHome();}
init();
</script>
</body>
</html>
